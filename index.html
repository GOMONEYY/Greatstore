<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>المتجر</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #0f0f14);
    --text: var(--tg-theme-text-color, #ffffff);
    --hint: var(--tg-theme-hint-color, #8a8a93);
    --btn: var(--tg-theme-button-color, #3390ec);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --card: var(--tg-theme-secondary-bg-color, #1c1c22);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
  }
  h1 { font-size: 20px; margin: 0 0 16px; }
  .grid { display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px;
  }
  .card h3 { margin: 0 0 4px; font-size: 16px; }
  .card p { margin: 4px 0; color: var(--hint); font-size: 13px; }
  .row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
  .price { font-weight: 700; font-size: 15px; }
  .stock { font-size: 12px; color: var(--hint); }
  button {
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 600;
  }
  .empty { text-align: center; color: var(--hint); margin-top: 40px; }
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: none; align-items: flex-end; justify-content: center; z-index: 10;
  }
  .overlay.show { display: flex; }
  .sheet {
    background: var(--bg); width: 100%; max-width: 480px;
    border-radius: 16px 16px 0 0; padding: 20px; padding-bottom: 30px;
  }
  .sheet h3 { margin-top: 0; }
  .pay-option {
    display: block; width: 100%; margin-top: 10px; text-align: right;
  }
  .close-btn { background: transparent; color: var(--hint); text-align: center; width: 100%; margin-top: 14px; }
</style>
</head>
<body>
  <h1>🛍️ المتجر</h1>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none">لا توجد منتجات متاحة حالياً</div>

  <div id="overlay" class="overlay">
    <div class="sheet">
      <h3 id="sheetTitle"></h3>
      <p id="sheetDesc" style="color:var(--hint)"></p>
      <button class="pay-option" onclick="pay('cryptobot')">💎 الدفع عبر CryptoBot</button>
      <button class="pay-option" onclick="pay('binance')">🟡 الدفع عبر Binance Pay</button>
      <button class="close-btn" onclick="closeSheet()">إلغاء</button>
    </div>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let currentProduct = null;

async function loadProducts() {
  const res = await fetch('/api/products');
  const products = await res.json();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  grid.innerHTML = '';
  if (!products.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h3>${p.name}</h3>
      <p>${p.description || ''}</p>
      <div class="row">
        <span class="price">${p.price}$</span>
        <span class="stock">متوفر: ${p.available}</span>
      </div>
    `;
    if (p.available > 0) {
      const btn = document.createElement('button');
      btn.style.marginTop = '10px';
      btn.style.width = '100%';
      btn.textContent = 'شراء الآن';
      btn.onclick = () => openSheet(p);
      card.appendChild(btn);
    }
    grid.appendChild(card);
  });
}

function openSheet(p) {
  currentProduct = p;
  document.getElementById('sheetTitle').textContent = p.name;
  document.getElementById('sheetDesc').textContent = `السعر: ${p.price}$`;
  document.getElementById('overlay').classList.add('show');
}
function closeSheet() {
  document.getElementById('overlay').classList.remove('show');
}

async function pay(method) {
  if (!currentProduct) return;
  const res = await fetch('/api/order', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      initData: tg.initData,
      product_id: currentProduct.id,
      method
    })
  });
  const data = await res.json();
  closeSheet();
  if (!data.ok) {
    tg.showAlert(data.error || 'حدث خطأ');
    return;
  }
  if (method === 'cryptobot') {
    tg.openLink(data.pay_url);
  } else {
    tg.showPopup({
      title: 'الدفع عبر Binance Pay',
      message: `حوّل ${currentProduct.price}$ إلى: ${data.binance_id}\n\nبعد التحويل اضغط تأكيد.`,
      buttons: [
        { id: 'confirm', type: 'default', text: 'لقد دفعت' },
        { id: 'cancel', type: 'cancel' }
      ]
    }, async (btnId) => {
      if (btnId === 'confirm') {
        await fetch('/api/binance-confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData: tg.initData, order_id: data.order_id })
        });
        tg.showAlert('تم إرسال طلبك للمراجعة، بيوصلك المنتج خلال دقائق.');
      }
    });
  }
}

loadProducts();
</script>
</body>
</html>
